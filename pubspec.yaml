name: aura_lift
description: Aura Lift - AI fitness buddy app
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_tts: ^4.2.2
  health: ^13.3.1
  shared_preferences: ^2.2.3
  flutter_animate: ^4.5.2
  fl_chart: ^1.2.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.4
  file_picker: ^8.0.7
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/branding/aura_lift_opening.png
    - assets/seed/exercises_seed.json
